name: Eval — RAGAS Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  eval:
    name: RAGAS evaluation
    runs-on: ubuntu-latest

    services:
      chromadb:
        image: chromadb/chroma:0.5.3
        ports:
          - "8001:8000"

    env:
      # LLM — Groq replaces Ollama; no local GPU/model download needed
      LLM_PROVIDER: groq
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.1-8b-instant
      # Judge model for RAGAS — Llama 4 Scout handles complex nested JSON schemas reliably
      GROQ_JUDGE_MODEL: meta-llama/llama-4-scout-17b-16e-instruct
      # ChromaDB (service above maps container :8000 → host :8001)
      CHROMA_HOST: localhost
      CHROMA_PORT: 8001
      # Retrieval & chunking
      EMBED_MODEL_NAME: BAAI/bge-base-en-v1.5
      BM25_INDEX_PATH: ./data/bm25_index.json
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 64
      TOP_K_RETRIEVE: 20
      TOP_K_RERANK: 5
      # Eval thresholds (must match .env / config.py defaults)
      EVAL_FAITHFULNESS_THRESHOLD: "0.75"
      EVAL_ANSWER_RELEVANCY_THRESHOLD: "0.70"
      # Use CI-specific dataset scoped to the 10-page PDF fixture
      EVAL_DATASET_PATH: tests/eval/ci_golden_dataset.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          # Bust cache only when the embedding model name changes
          key: hf-${{ env.EMBED_MODEL_NAME }}-${{ runner.os }}

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Check PDF fixture exists
        run: |
          if [ ! -f "tests/fixtures/ai_engineering_excerpt.pdf" ]; then
            echo "::error::tests/fixtures/ai_engineering_excerpt.pdf not found."
            echo "Commit a 10-page excerpt of the AI Engineering book to this path."
            exit 1
          fi

      - name: Create data directory
        run: mkdir -p backend/data

      - name: Ingest PDF fixture into ChromaDB
        working-directory: backend
        run: |
          python - <<'EOF'
          import sys, logging, pathlib
          logging.basicConfig(level=logging.INFO)
          sys.path.insert(0, ".")
          from app.config import settings
          from app.ingestion.pdf_parser import PDFParser
          from app.ingestion.chunker import RecursiveChunker
          from app.ingestion.embedder import Embedder
          from app.retrieval.vector_store import VectorStore
          from app.retrieval.bm25_store import BM25Store

          pdf = pathlib.Path("../tests/fixtures/ai_engineering_excerpt.pdf")
          pages = PDFParser().parse(str(pdf))
          chunks = RecursiveChunker(settings.chunk_size, settings.chunk_overlap).chunk(pages)
          embedder = Embedder(settings.embed_model_name)
          chunk_embeddings = embedder.embed_chunks(chunks)

          vs = VectorStore()
          vs.delete_all()
          vs.add_chunks([ce[0] for ce in chunk_embeddings], [ce[1] for ce in chunk_embeddings])

          bm25 = BM25Store()
          bm25.build(chunks)
          pathlib.Path(settings.bm25_index_path).parent.mkdir(parents=True, exist_ok=True)
          bm25.save(settings.bm25_index_path)

          print(f"Ingested {len(pages)} pages → {len(chunks)} chunks")
          EOF

      - name: Run RAGAS evaluation
        working-directory: backend
        run: python -m app.evaluation.ragas_runner

      - name: Assert thresholds with pytest
        working-directory: backend
        run: pytest tests/eval/test_ragas.py -v

      - name: Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'backend/eval_report.json';
            if (!fs.existsSync(reportPath)) {
              console.log('eval_report.json not found — skipping comment');
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const icon = report.passed ? '✅' : '❌';
            const status = report.passed ? 'PASSED' : 'FAILED';
            const body = [
              `## ${icon} RAGAS Evaluation — ${status}`,
              '',
              '| Metric | Score | Threshold |',
              '|---|---|---|',
              `| Faithfulness | ${report.faithfulness.toFixed(3)} | ≥ ${ process.env.EVAL_FAITHFULNESS_THRESHOLD } |`,
              `| Answer Relevancy | ${report.answer_relevancy.toFixed(3)} | ≥ ${ process.env.EVAL_ANSWER_RELEVANCY_THRESHOLD } |`,
              `| Context Precision | ${report.context_precision.toFixed(3)} | — |`,
              `| Context Recall | ${report.context_recall.toFixed(3)} | — |`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
