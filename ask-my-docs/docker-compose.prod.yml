services:
  backend:
    env_file: .env
    restart: unless-stopped
    volumes: []

  frontend:
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  chromadb:
    restart: unless-stopped
    ports: []

  ollama:
    restart: unless-stopped
    ports: []

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
